<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeski — Stock Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg:     #080c14;
            --panel:  rgba(13, 20, 34, 0.9);
            --border: rgba(0, 212, 255, 0.15);
            --cyan:   #00d4ff;
            --green:  #00e87a;
            --red:    #ff2d55;
            --mono:   'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #d8eaf5;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-family: var(--mono);
            font-size: 18px;
            letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: 0 0 16px rgba(0,212,255,0.4);
            margin-bottom: 18px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: #d8eaf5;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 13px;
        }
        select option { background: #0c1120; }

        #stats-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 18px rgba(0,212,255,0.1);
            transition: box-shadow 0.2s;
        }
        #stats-card:hover { box-shadow: 0 0 26px rgba(0,212,255,0.2); }

        .stats-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--cyan);
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .stat-item { display: flex; flex-direction: column; gap: 3px; }

        .label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 1.5px;
            color: rgba(0,212,255,0.6);
            text-transform: uppercase;
        }

        .value {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--cyan);
        }
        .value.up   { color: var(--green); }
        .value.down { color: var(--red); }

        #chart, #rsi-chart { border-radius: 8px; overflow: hidden; }

        .ws-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 3px 9px;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: #5e7e9a;
            letter-spacing: 1px;
        }
        .ws-badge.on { color: var(--green); border-color: rgba(0,232,122,0.3); }
    </style>
</head>
<body>

    <h1>◈ TRADESKI</h1>

    <div class="toolbar">
        <select id="symbol-select">
            <option value="AAPL">AAPL — Apple</option>
            <option value="MSFT">MSFT — Microsoft</option>
            <option value="TSLA">TSLA — Tesla</option>
            <option value="NVDA">NVDA — NVIDIA</option>
            <option value="AMZN">AMZN — Amazon</option>
        </select>
        <span class="ws-badge" id="ws-badge">● CONNECTING</span>
    </div>

    <div id="stats-card">
        <div class="stats-title">Market Overview</div>
        <div class="stats-row">
            <div class="stat-item">
                <span class="label">Symbol</span>
                <span id="stat-symbol" class="value">—</span>
            </div>
            <div class="stat-item">
                <span class="label">Price</span>
                <span id="stat-price" class="value">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="label">Change</span>
                <span id="stat-change" class="value">—</span>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <span class="label">Open</span>
                <span id="stat-open" class="value">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="label">High</span>
                <span id="stat-high" class="value up">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="label">Low</span>
                <span id="stat-low" class="value down">$0.00</span>
            </div>
        </div>
    </div>

    <div id="chart"></div>
    <br>
    <div id="rsi-chart"></div>

    <script src="/static/chart.js"></script>
    <script>
        const socket = io({ path: "/socket.io", transports: ["websocket", "polling"] });
        const badge  = document.getElementById("ws-badge");

        socket.on("connect", () => {
            badge.textContent = "● LIVE";
            badge.classList.add("on");
        });
        socket.on("disconnect", () => {
            badge.textContent = "● OFFLINE";
            badge.classList.remove("on");
        });
        socket.on("price_update", (data) => {
            const priceEl = document.getElementById("stat-price");
            if (priceEl) priceEl.textContent = "$" + parseFloat(data.price).toFixed(2);
        });
    </script>
</body>
</html>

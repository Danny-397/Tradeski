<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        /* Dark mode styling */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #chart {
            width: 90%;
            height: 500px;
            margin: auto;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1e1e1e;
        }

        select {
            background-color: #1e1e1e;
            color: #e0e0e0;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        #stats-card {
    width: 90%;
    margin: 20px auto;
    padding: 16px;
    border-radius: 12px;
    background: rgba(20, 20, 30, 0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(0, 200, 255, 0.35);
    box-shadow: 0 0 12px rgba(0, 200, 255, 0.25);
    transition: 0.25s ease;
}

#stats-card:hover {
    box-shadow: 0 0 18px rgba(0, 200, 255, 0.45);
    border-color: rgba(0, 200, 255, 0.55);
}

.stats-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 12px;
    color: #00eaff;
}

.stats-row {
    display: flex;
    justify-content: space-between;
}

.stat-item {
    display: flex;
    flex-direction: column;
    text-align: left;
}

.label {
    font-size: 12px;
    color: #7ddfff;
    opacity: 0.8;
}

.value {
    font-size: 18px;
    font-weight: bold;
    color: #00eaff;
}

    </style>
</head>

<body>
    <h1>Real-Time Stock Dashboard</h1>

    <!-- Multi-stock dropdown -->
    <select id="symbol-select">
        <option value="AAPL">AAPL</option>
        <option value="TSLA">TSLA</option>
        <option value="NVDA">NVDA</option>
        <option value="MSFT">MSFT</option>
        <option value="AMZN">AMZN</option>
    </select>

    <div id="stats-card">
    <div class="stats-title">Stock Overview</div>
    <div class="stats-row">
        <div class="stat-item">
            <span class="label">Symbol</span>
            <span id="stat-symbol" class="value">AAPL</span>
        </div>
        <div class="stat-item">
            <span class="label">Current Price</span>
            <span id="stat-price" class="value">$0.00</span>
        </div>
    </div>
</div>

   
    <div id="chart"></div>
    

    <script src="/static/chart.js"></script>
</body>
</html>

services:
  - type: web
    name: tradeski-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      # Non-secret defaults — safe to commit
      - key: STOCK_SYMBOLS
        value: AAPL,MSFT,TSLA,NVDA,AMZN
      - key: CHECK_INTERVAL
        value: "60"
      # Secrets — set these in the Render dashboard after connecting the repo
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PUSHOVER_USER_KEY
        sync: false
      - key: PUSHOVER_API_TOKEN
        sync: false
